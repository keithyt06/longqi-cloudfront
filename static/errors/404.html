<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - 页面未找到 | Unice Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
      background-color: #f5f7fa;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .error-container {
      text-align: center;
      max-width: 480px;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 700;
      color: #fbbc04;
      line-height: 1;
      margin-bottom: 16px;
    }
    .error-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: #1a1a2e;
    }
    .error-message {
      font-size: 1rem;
      color: #666;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .error-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .error-link {
      display: inline-block;
      padding: 10px 32px;
      background-color: #1a73e8;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
      font-size: 0.95rem;
      transition: background-color 0.2s;
    }
    .error-link:hover {
      background-color: #1557b0;
    }
    .error-link-secondary {
      background-color: #fff;
      color: #333;
      border: 1px solid #ddd;
    }
    .error-link-secondary:hover {
      background-color: #f5f5f5;
    }
    .error-brand {
      margin-top: 48px;
      font-size: 0.8rem;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-code">404</div>
    <h1 class="error-title">页面未找到</h1>
    <p class="error-message">
      您访问的页面不存在或已被移除。请检查 URL 是否正确，或返回首页浏览。
    </p>
    <div class="error-actions">
      <a href="/" class="error-link">返回首页</a>
      <a href="/products" class="error-link error-link-secondary">浏览商品</a>
    </div>
    <p class="error-brand">Unice Demo &mdash; CloudFront 全功能演示平台</p>
  </div>
</body>
</html>
